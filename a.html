<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>안전보건 의견접수</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: #f3f5f7;
      color: #1f2937;
    }

    .wrap {
      min-height: 100vh;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 18px;
      padding: 22px 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      color: #2563eb;
      background: #dbeafe;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.3;
    }

    .desc {
      margin: 0 0 20px;
      font-size: 14px;
      line-height: 1.6;
      color: #4b5563;
    }

    .section-title {
      margin: 18px 0 8px;
      font-size: 13px;
      font-weight: 700;
      color: #374151;
    }

    .required::after {
      content: " *";
      color: #dc2626;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 16px;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .textarea {
      min-height: 140px;
      resize: vertical;
      line-height: 1.5;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 12px 14px;
      background: #fff;
    }

    .option input {
      width: 18px;
      height: 18px;
      margin: 0;
      accent-color: #2563eb;
      flex: 0 0 auto;
    }

    .option span {
      font-size: 15px;
    }

    .row {
      display: grid;
      gap: 12px;
    }

    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
    }

    .submit-btn {
      width: 100%;
      margin-top: 22px;
      border: none;
      border-radius: 14px;
      background: #2563eb;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 15px 16px;
      cursor: pointer;
    }

    .submit-btn:hover { background: #1d4ed8; }

    .submit-btn:active { transform: translateY(1px); }

    .complete {
      display: none;
      text-align: center;
      padding: 14px 6px 4px;
    }

    .complete.show { display: block; }

    .complete h2 {
      margin: 8px 0;
      font-size: 22px;
    }

    .complete p {
      margin: 0;
      font-size: 14px;
      color: #4b5563;
      line-height: 1.6;
    }

    .hidden { display: none; }

    @media (min-width: 768px) {
      .wrap { padding: 28px; }
      .card { padding: 28px; }
      .row.two { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div id="formArea">
        <div class="badge">모바일 의견접수</div>
        <h1>안전보건 의견청취</h1>
        <p class="desc">
          현장의 안전 및 보건과 관련된 개선사항, 건의사항, 위험요소를 자유롭게 작성해 주세요.
          모바일에서도 쉽고 빠르게 제출할 수 있도록 구성한 페이지입니다.
        </p>

        <form id="surveyForm">
          <label class="section-title required" for="department">소속 / 부서</label>
          <input class="input" id="department" name="department" type="text" placeholder="예: 생산팀 / 현장명" required />

          <div class="row two">
            <div>
              <label class="section-title" for="name">성명</label>
              <input class="input" id="name" name="name" type="text" placeholder="익명 제출 시 비워도 됩니다" />
            </div>
            <div>
              <label class="section-title" for="phone">연락처</label>
              <input class="input" id="phone" name="phone" type="text" placeholder="선택 입력" />
            </div>
          </div>

          <div class="section-title">제출 방식</div>
          <div class="options">
            <label class="option">
              <input type="radio" name="privacy" value="실명" checked />
              <span>실명 제출</span>
            </label>
            <label class="option">
              <input type="radio" name="privacy" value="익명" />
              <span>익명 제출</span>
            </label>
          </div>

          <label class="section-title required" for="category">의견 유형</label>
          <select class="select" id="category" name="category" required>
            <option value="">선택하세요</option>
            <option>안전</option>
            <option>보건</option>
            <option>작업환경</option>
            <option>시설개선</option>
            <option>기타</option>
          </select>

          <label class="section-title" for="location">발생 장소 / 위치</label>
          <input class="input" id="location" name="location" type="text" placeholder="예: 3공장 북측 통로" />

          <label class="section-title required" for="content">의견 내용</label>
          <textarea class="textarea" id="content" name="content" placeholder="위험요소, 개선이 필요한 사항, 건의사항 등을 작성해 주세요." required></textarea>
          <div class="hint">예: 통로 적치물로 인해 이동 시 걸림 위험이 있습니다. 정리정돈 및 이동통로 표시가 필요합니다.</div>

          <label class="section-title" for="photo">사진 첨부</label>
          <input class="input" id="photo" name="photo" type="file" accept="image/*" />
          <div class="hint">현재 샘플 페이지에서는 파일만 선택됩니다. 실제 저장 기능은 별도 연결이 필요합니다.</div>

          <button type="submit" class="submit-btn">의견 제출하기</button>
        </form>
      </div>

      <div id="completeArea" class="complete">
        <div class="badge">접수 완료</div>
        <h2>의견이 정상 접수되었습니다.</h2>
        <p>소중한 의견 감사합니다.<br />담당자가 확인 후 검토에 반영하겠습니다.</p>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('surveyForm');
    const formArea = document.getElementById('formArea');
    const completeArea = document.getElementById('completeArea');
    const privacyRadios = document.querySelectorAll('input[name="privacy"]');
    const nameInput = document.getElementById('name');
    const phoneInput = document.getElementById('phone');

    function toggleAnonymousFields() {
      const selected = document.querySelector('input[name="privacy"]:checked')?.value;
      const isAnonymous = selected === '익명';
      nameInput.disabled = isAnonymous;
      phoneInput.disabled = isAnonymous;
      nameInput.placeholder = isAnonymous ? '익명 제출 선택됨' : '익명 제출 시 비워도 됩니다';
      phoneInput.placeholder = isAnonymous ? '익명 제출 선택됨' : '선택 입력';
      if (isAnonymous) {
        nameInput.value = '';
        phoneInput.value = '';
      }
    }

    privacyRadios.forEach(radio => {
      radio.addEventListener('change', toggleAnonymousFields);
    });

    toggleAnonymousFields();

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      formArea.classList.add('hidden');
      completeArea.classList.add('show');

      // 실제 저장 기능을 붙일 때는 여기서 fetch()로 서버/구글시트/폼 등에 전송하면 됩니다.
      console.log('제출 데이터 샘플', Object.fromEntries(new FormData(form).entries()));
    });
  </script>
</body>
</html>
